name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build doesn't connect to the DB (pages are server-rendered at
          # runtime); placeholders satisfy env validation / module init.
          DATABASE_URL: postgres://user:pass@localhost:5432/db
          AUTH_SECRET: ci-placeholder-secret-not-used-at-build
          NEXT_PUBLIC_REALTIME: poll
