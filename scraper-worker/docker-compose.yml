# Isolated Compose project — does NOT touch any existing containers/networks.
# Project name is pinned so its network is `sellerctrl-scraper_default`.
# Run from this folder:  docker compose up -d --build
name: sellerctrl-scraper

services:
  worker:
    build: .
    container_name: sellerctrl-scraper-worker
    restart: unless-stopped
    env_file:
      - .env
    # No published ports — the worker only makes OUTBOUND calls to APP_URL.
    init: true
