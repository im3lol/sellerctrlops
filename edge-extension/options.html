<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="sidepanel.css" />
    <title>إعدادات السحب الذكي</title>
    <style>
      body { background: #fff; }
      .wrap { max-width: 520px; margin: 0 auto; padding: 24px 20px 48px; }
      label { display: block; font-weight: 700; font-size: 13px; margin: 14px 0 6px; }
      input { width: 100%; font-family: inherit; font-size: 14px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; }
      input[dir="ltr"] { direction: ltr; text-align: left; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    </style>
  </head>
  <body>
    <header>
      <span class="mark">
        <svg viewBox="0 0 128 128"><path d="M50 38 L50 90 L92 64 Z" fill="#F7C52D" /></svg>
      </span>
      <div>
        <h1>إعدادات السحب الذكي</h1>
        <p>SellerCtrl Workspace OS</p>
      </div>
    </header>
    <div class="wrap">
      <div id="toast" class="hidden"></div>

      <label for="apiBase">رابط المنصة (Base URL)</label>
      <input id="apiBase" dir="ltr" placeholder="https://sellerctrlops.vercel.app" />
      <p class="hint">رابط تطبيق SellerCtrl بدون / في الآخر.</p>

      <label for="token">رمز السحب (SCRAPER_TOKEN)</label>
      <input id="token" dir="ltr" placeholder="نفس القيمة المضبوطة في المنصة" />
      <p class="hint">نفس قيمة SCRAPER_TOKEN في إعدادات المنصة على Vercel.</p>

      <label for="workspaceId">معرّف مساحة العمل (Workspace ID)</label>
      <input id="workspaceId" dir="ltr" placeholder="UUID من رابط /workspaces/…" />
      <p class="hint">انسخه من رابط مساحة العمل داخل المنصة.</p>

      <label for="workspaceName">اسم مساحة العمل (اختياري)</label>
      <input id="workspaceName" placeholder="للعرض فقط" />

      <div class="row" style="margin-top: 18px; gap: 10px">
        <button id="test" class="btn-ghost">اختبار الاتصال</button>
        <button id="save" class="btn-primary" style="width: auto; flex: 1">حفظ</button>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
