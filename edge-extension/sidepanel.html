<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="sidepanel.css" />
    <title>السحب الذكي</title>
  </head>
  <body>
    <header>
      <span class="mark">
        <svg viewBox="0 0 128 128"><path d="M50 38 L50 90 L92 64 Z" fill="#F7C52D" /></svg>
      </span>
      <div>
        <h1>السحب الذكي</h1>
        <p>SellerCtrl Workspace OS</p>
      </div>
    </header>

    <main>
      <div id="toast" class="hidden"></div>

      <!-- Not configured -->
      <div id="needsConfig" class="card hidden">
        <h2>الإعداد مطلوب</h2>
        <p class="muted">حدّد رابط المنصة والرمز ومساحة العمل قبل البدء.</p>
        <button id="openOptions" class="btn-ghost btn-sm">فتح الإعدادات</button>
      </div>

      <!-- Step 1: load drafts -->
      <div id="step1" class="card hidden">
        <h2>١. المنتجات المسودة</h2>
        <div class="row between">
          <span class="muted" id="wsLabel">—</span>
          <button id="loadDrafts" class="btn-ghost btn-sm">تحميل</button>
        </div>
        <p id="draftsInfo" class="muted" style="margin-top: 8px">لم تُحمّل بعد.</p>
      </div>

      <!-- Step 2: pick -->
      <div id="step2" class="card hidden">
        <h2>٢. افتح المنتج وحدّد العناصر</h2>
        <button id="openPick" class="btn-primary">فتح أول منتج وبدء الالتقاط</button>
        <p class="muted" id="pickHint" style="margin-top: 8px">
          بعد فتح الصفحة، اضغط «حدّد» بجوار كل حقل ثم اضغط على العنصر المقابل في الصفحة.
        </p>
      </div>

      <!-- Step 3: fields -->
      <div id="step3" class="card hidden">
        <h2>٣. الحقول</h2>
        <div id="fields" class="stack"></div>
      </div>

      <!-- Step 4: save & run -->
      <div id="step4" class="card hidden">
        <h2>٤. حفظ وتشغيل</h2>
        <div class="stack">
          <button id="saveRecipe" class="btn-ghost">حفظ الوصفة فقط</button>
          <button id="saveRun" class="btn-accent">حفظ وتشغيل على كل المنتجات</button>
        </div>
        <div id="jobBox" class="hidden" style="margin-top: 12px">
          <div class="row between" style="margin-bottom: 6px">
            <span class="muted">التقدم</span>
            <span class="pill" id="jobStat">0 / 0</span>
          </div>
          <div class="progress"><span id="jobBar"></span></div>
          <p class="muted" id="jobMsg" style="margin-top: 6px"></p>
        </div>
      </div>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
